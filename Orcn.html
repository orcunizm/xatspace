<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>XatSpace</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat');

        /* İlk başta görünecek arka plan (Karanlık Tema) */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            height: 100vh;
            overflow: hidden;
            transition: background 0.8s ease-in-out; /* Geçiş yumuşatma */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Başlık Alanı - Ekranı kaplar */
        .title {
            font-family: "Montserrat";
            text-align: center;
            color: #FFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            letter-spacing: 1px;
            cursor: pointer; /* Tıklanabilir olduğunu belli eder */
            user-select: none;
        }

        /* İçinde GIF dönen havalı dev yazı */
        h1 {
            background-image: url(https://xatimg.com/image/fFPGX21ITsYT.gif);
            background-size: cover;
            color: transparent;
            -moz-background-clip: text;
            -webkit-background-clip: text;
            text-transform: uppercase;
            font-size: 120px;
            line-height: .75;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <!-- Avatar falan tamamen kaldırıldı, sadece bu yazıya tıklanacak -->
    <div class="title" onclick="aktifEtAnimeSpace()">
        <h1>xat.<br/>com</h1>
    </div>

    <script>
        function aktifEtAnimeSpace() {
            // Buraya senin xatimg sitesinden bulduğun kendi anime GIF linkini koydum:
            const seninAnimeGifiniz = "https://xatimg.com/image/vYGE2RjJUo9C.gif";
            
            // Tıklandığı an arka planı tamamen senin anime GIF'in yapar
            document.body.style.backgroundImage = "url('" + seninAnimeGifiniz + "')";
        }
    </script>

</body>
</html>
