<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>XatSpace</title>
    <style>
        /* Tüm ekranı kaplayan ana yapı */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111; /* İlk baştaki siyah arka plan */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            transition: background 0.5s ease-in-out;
        }

        /* Tıklanacak Avatar Alanı */
        .avatar-kutusu {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.3s, opacity 0.5s;
            z-index: 10;
        }

        .avatar-kutusu:hover {
            transform: scale(1.05); /* Üzerine gelince hafif büyür */
        }

        .avatar-kutusu img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Avatar tıklandıktan sonra gizlenmesi için gereken sınıf */
        .gizle {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- İlk başta sadece bu yuvarlak avatar görünecek -->
    <div class="avatar-kutusu" id="profilAvatar" onclick="gifAlaniniAc()">
        <!-- İçindeki resim linkini istersen değiştirebilirsin, şu an geçici cool bir resim var -->
        <img src="https://xatimg.com/image/8SC09L" alt="Avatar">
    </div>

    <script>
        function gifAlaniniAc() {
            // Senin o asıl kullanmak istediğin anime GIF linkin:
            const animeGifLinkiniz = "https://xatimg.com/image/fFPGX21ITsYT.gif";
            
            // 1. Arka planı tamamen senin anime GIF'in yapar
            document.body.style.backgroundImage = "url('" + animeGifLinkiniz + "')";
            
            // 2. Ortadaki avatarı tamamen yok eder
            document.getElementById("profilAvatar").classList.add("gizle");
        }
    </script>

</body>
</html>
